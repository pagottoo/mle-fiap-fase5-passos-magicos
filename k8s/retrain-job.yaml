apiVersion: batch/v1
kind: Job
metadata:
  name: passos-magicos-retrain-job
  namespace: passos-magicos
  labels:
    app: passos-magicos
    component: training
  annotations:
    mlops.passos-magicos/triggered-at: "2026-03-22T00:00:12.548415"
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: passos-magicos
        component: training
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: docker.io/pagottoo/passos-magicos-api:v1.0.0
          imagePullPolicy: Always
          command: ["python", "scripts/train_model.py"]
          args: ["--year", "all", "--promote-to-staging"]
          envFrom:
            - configMapRef:
                name: passos-magicos-config
            - configMapRef:
                name: passos-magicos-train-config
            - secretRef:
                name: mlops-data-creds
            - secretRef:
                name: mlflow-tracking-auth
                optional: true
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://passos-magicos-otel-collector.mle-system.svc.cluster.local:4317"
            - name: ENABLE_OTEL
              value: "true"
          volumeMounts:
            - name: models
              mountPath: /app/models
            - name: logs
              mountPath: /app/logs
            - name: feature-store
              mountPath: /app/feature_store
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1500m"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
        - name: logs
          persistentVolumeClaim:
            claimName: logs-pvc
        - name: feature-store
          persistentVolumeClaim:
            claimName: feature-store-pvc
